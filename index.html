<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner: Survival</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --neon-yellow: #fff200;
            --bg-color: #0d0d0d;
            --card-bg: rgba(20, 20, 20, 0.9);
            --font-sans: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: var(--font-sans);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            transition: opacity 0.3s;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 4px;
            text-align: center;
        }

        .menu-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 250px;
            margin: 10px 0;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .menu-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        .secondary-btn {
            border-color: var(--neon-magenta);
            color: var(--neon-magenta);
        }

        .secondary-btn:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 20px var(--neon-magenta);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 50;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            text-shadow: 0 0 5px #000;
        }

        .hud-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 50;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            background: rgba(0, 243, 255, 0.3);
            border-color: var(--neon-cyan);
        }

        /* Shop */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
            width: 320px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-item.locked {
            opacity: 0.6;
        }

        .shop-item.selected {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
        }

        .theme-preview {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            border-radius: 4px;
        }

        .price-tag {
            font-size: 0.8rem;
            color: var(--neon-yellow);
        }

        /* Difficulty select */
        .difficulty-row {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .diff-btn {
            font-size: 0.8rem;
            padding: 5px 15px;
            width: auto;
        }

        .diff-btn.active {
            background: var(--neon-cyan);
            color: black;
        }

        /* Level selector */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 1.5rem;
        }

        .level-card {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--neon-cyan);
            cursor: pointer;
            font-weight: bold;
        }

        .level-card.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .level-card.completed {
            background: var(--neon-lime);
            color: black;
            border-color: var(--neon-lime);
        }

        .credits {
            position: absolute;
            bottom: 10px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item">
                <span class="hud-label">Distance</span>
                <span id="score-val" class="hud-value">0</span>
            </div>
            <div class="hud-item" style="align-items: center;">
                <span id="level-indicator" class="hud-label">Endless</span>
                <div id="shield-indicator" class="hidden" style="color: var(--neon-lime); font-size: 0.7rem; margin-top: 5px;">🛡️ SHIELD ACTIVE</div>
            </div>
            <div class="hud-item" style="align-items: flex-end;">
                <span class="hud-label">Coins</span>
                <span id="coin-val" class="hud-value">0</span>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="menu-overlay" class="overlay">
            <h1>Neon Runner</h1>
            <button id="start-endless" class="menu-btn">Endless Mode</button>
            <button id="start-levels" class="menu-btn secondary-btn">Level Mode</button>
            <button id="open-shop" class="menu-btn" style="border-color: var(--neon-yellow); color: var(--neon-yellow);">Shop</button>
            
            <div class="difficulty-row" style="margin-top: 20px;">
                <button class="menu-btn diff-btn active" data-difficulty="easy">Easy</button>
                <button class="menu-btn diff-btn" data-difficulty="medium">Medium</button>
                <button class="menu-btn diff-btn" data-difficulty="hard">Hard</button>
            </div>

            <div class="credits">Crafted by Pranav Subedi</div>
        </div>

        <!-- Level Selector -->
        <div id="level-overlay" class="overlay hidden">
            <h1>Select Level</h1>
            <div class="level-grid" id="level-items"></div>
            <button id="back-to-menu-from-levels" class="menu-btn secondary-btn">Back</button>
        </div>

        <!-- Shop -->
        <div id="shop-overlay" class="overlay hidden">
            <h1>Neon Shop</h1>
            <div style="margin-bottom: 20px; color: var(--neon-yellow);">Balance: <span id="shop-coin-val">0</span> 🪙</div>
            <div class="shop-grid" id="shop-items"></div>
            <button id="back-to-menu-from-shop" class="menu-btn secondary-btn">Back</button>
        </div>

        <!-- Game Over -->
        <div id="gameover-overlay" class="overlay hidden">
            <h1 style="color: #ff3e3e; text-shadow: 0 0 10px #ff3e3e;">Crashed</h1>
            <div style="margin-bottom: 20px; font-size: 1.2rem;">Distance: <span id="final-score">0</span>m</div>
            <div style="margin-bottom: 20px; font-size: 1.2rem; color: var(--neon-yellow);">Coins: +<span id="gained-coins">0</span></div>
            <button id="restart-btn" class="menu-btn">Retry</button>
            <button id="exit-btn" class="menu-btn secondary-btn">Main Menu</button>
        </div>

        <!-- Level Complete -->
        <div id="complete-overlay" class="overlay hidden">
            <h1 style="color: var(--neon-lime); text-shadow: 0 0 10px var(--neon-lime);">Level Clear</h1>
            <div style="margin-bottom: 20px; font-size: 1.5rem;">Target Reached!</div>
            <button id="next-level-btn" class="menu-btn">Next Level</button>
            <button id="exit-complete-btn" class="menu-btn secondary-btn">Main Menu</button>
        </div>

        <!-- Pause -->
        <div id="pause-overlay" class="overlay hidden">
            <h1>Paused</h1>
            <button id="resume-btn" class="menu-btn">Resume</button>
            <button id="quit-btn" class="menu-btn secondary-btn">Quit</button>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls" class="hidden">
            <div class="control-btn" id="btn-left">←</div>
            <div class="control-btn" id="btn-pause">⏸</div>
            <div class="control-btn" id="btn-right">→</div>
        </div>
    </div>
    <script>
        /**
         * Neon Runner: Survival
         * Crafted by Pranav Subedi
         */

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // Game State
        const STATE_MENU = 'menu';
        const STATE_PLAYING = 'playing';
        const STATE_PAUSED = 'paused';
        const STATE_GAMEOVER = 'gameover';
        const STATE_LEVEL_SELECT = 'level_select';
        const STATE_SHOP = 'shop';
        const STATE_COMPLETE = 'complete';

        let currentState = STATE_MENU;
        let gameMode = 'endless'; // 'endless' or 'level'
        let currentLevel = 1;
        let difficulty = 'easy'; // easy, medium, hard
        let coins = parseInt(localStorage.getItem('neon_runner_coins')) || 0;
        let unlockedLevels = parseInt(localStorage.getItem('neon_runner_levels')) || 1;
        let selectedTheme = localStorage.getItem('neon_runner_theme') || 'cyan';
        let unlockedThemes = JSON.parse(localStorage.getItem('neon_runner_unlocked_themes')) || ['cyan'];

        const themes = {
            cyan: { name: 'Cyber Cyan', color: '#00f3ff', price: 0 },
            magenta: { name: 'Matrix Magenta', color: '#ff00ff', price: 100 },
            lime: { name: 'Acid Lime', color: '#39ff14', price: 250 },
            yellow: { name: 'Electric Gold', color: '#fff200', price: 500 },
            red: { name: 'Vampire Red', color: '#ff3e3e', price: 1000 }
        };

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynthSound(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            move: () => playSynthSound(400, 'sine', 0.1),
            coin: () => playSynthSound(880, 'triangle', 0.2),
            hit: () => playSynthSound(100, 'sawtooth', 0.3, 0.2),
            win: () => {
                playSynthSound(523.25, 'sine', 0.2);
                setTimeout(() => playSynthSound(659.25, 'sine', 0.2), 100);
                setTimeout(() => playSynthSound(783.99, 'sine', 0.4), 200);
            },
            click: () => playSynthSound(600, 'sine', 0.05)
        };

        // Game Variables
        let player = {
            lane: 1, // 0, 1, 2
            targetX: 0,
            x: 0,
            y: 0,
            width: 40,
            height: 60,
            shield: false,
            color: themes[selectedTheme].color
        };

        let obstacles = [];
        let pickups = [];
        let particles = [];
        let score = 0;
        let gameCoins = 0;
        let speed = 5;
        let distanceMultiplier = 1;
        let laneWidth = 0;
        let gameWidth = 0;
        let gameHeight = 0;
        let spawnTimer = 0;
        let lastTime = 0;
        let targetScore = 0;
        let speedIncreaseRate = 0.0005;

        // Constants based on difficulty
        const diffSettings = {
            easy: { speed: 5, spawnRate: 80, speedRate: 0.0005 },
            medium: { speed: 7, spawnRate: 60, speedRate: 0.0008 },
            hard: { speed: 10, spawnRate: 45, speedRate: 0.0012 }
        };

        function resize() {
            gameWidth = container.clientWidth;
            gameHeight = container.clientHeight;
            canvas.width = gameWidth;
            canvas.height = gameHeight;
            laneWidth = gameWidth / 3;
            player.width = laneWidth * 0.4;
            player.height = player.width * 1.5;
            player.y = gameHeight - player.height - 100;
            updatePlayerX(true);
        }

        function updatePlayerX(immediate = false) {
            player.targetX = player.lane * laneWidth + laneWidth / 2;
            if (immediate) player.x = player.targetX;
        }

        function moveLeft() {
            if (player.lane > 0) {
                player.lane--;
                updatePlayerX();
                sfx.move();
            }
        }

        function moveRight() {
            if (player.lane < 2) {
                player.lane++;
                updatePlayerX();
                sfx.move();
            }
        }

        // Object Classes
        class Obstacle {
            constructor(type) {
                this.lane = Math.floor(Math.random() * 3);
                this.x = this.lane * laneWidth + laneWidth / 2;
                this.y = -100;
                this.type = type; // square, rectangle, circle, moving, fast
                this.width = laneWidth * 0.5;
                this.height = this.width;
                this.speed = speed;
                this.moveSpeed = 0;
                this.moveDir = Math.random() > 0.5 ? 1 : -1;

                if (type === 'rectangle') {
                    this.height = this.width * 1.5;
                } else if (type === 'fast') {
                    this.speed = speed * 1.5;
                } else if (type === 'moving') {
                    this.moveSpeed = 2;
                }
            }

            update(dt) {
                this.y += this.speed;
                if (this.type === 'moving') {
                    this.x += this.moveSpeed * this.moveDir;
                    const leftBound = this.lane * laneWidth + 10;
                    const rightBound = (this.lane + 1) * laneWidth - 10;
                    if (this.x < leftBound || this.x > rightBound) {
                        this.moveDir *= -1;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff0044';
                ctx.strokeStyle = '#ff0044';
                ctx.lineWidth = 3;
                
                const drawX = this.x - this.width / 2;
                const drawY = this.y - this.height / 2;

                if (this.type === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.width / 2, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.type === 'rectangle' || this.type === 'square' || this.type === 'moving' || this.type === 'fast') {
                    ctx.strokeRect(drawX, drawY, this.width, this.height);
                    // Inner details
                    ctx.lineWidth = 1;
                    ctx.strokeRect(drawX + 5, drawY + 5, this.width - 10, this.height - 10);
                }
                ctx.restore();
            }
        }

        class Pickup {
            constructor(type) {
                this.lane = Math.floor(Math.random() * 3);
                this.x = this.lane * laneWidth + laneWidth / 2;
                this.y = -100;
                this.type = type; // coin, shield
                this.size = 20;
                this.rotation = 0;
            }

            update() {
                this.y += speed;
                this.rotation += 0.05;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (this.type === 'coin') {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = varToColor('--neon-yellow');
                    ctx.fillStyle = varToColor('--neon-yellow');
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (this.type === 'shield') {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = varToColor('--neon-lime');
                    ctx.strokeStyle = varToColor('--neon-lime');
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size/2);
                    ctx.lineTo(this.size/2, 0);
                    ctx.lineTo(0, this.size/2);
                    ctx.lineTo(-this.size/2, 0);
                    ctx.closePath();
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.size = Math.random() * 4 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        function varToColor(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        // Game Loop Functions
        function initGame(mode, level = 1) {
            gameMode = mode;
            currentLevel = level;
            score = 0;
            gameCoins = 0;
            obstacles = [];
            pickups = [];
            particles = [];
            const settings = diffSettings[difficulty];
            speed = settings.speed;
            spawnTimer = 0;
            player.lane = 1;
            player.shield = false;
            player.color = themes[selectedTheme].color;
            updatePlayerX(true);
            
            if (mode === 'level') {
                targetScore = level * 100 + 100;
                document.getElementById('level-indicator').textContent = 'Level ' + level;
            } else {
                document.getElementById('level-indicator').textContent = 'Endless';
            }

            document.getElementById('shield-indicator').classList.add('hidden');
            document.getElementById('score-val').textContent = '0';
            document.getElementById('coin-val').textContent = '0';
            
            currentState = STATE_PLAYING;
            showOverlay('');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');
            requestAnimationFrame(gameLoop);
        }
        function showOverlay(id) {
            const overlays = ['menu-overlay', 'level-overlay', 'shop-overlay', 'gameover-overlay', 'complete-overlay', 'pause-overlay'];
            overlays.forEach(o => document.getElementById(o).classList.add('hidden'));
            if (id) {
                document.getElementById(id).classList.remove('hidden');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('mobile-controls').classList.add('hidden');
            }
        }

        function gameLoop(timestamp) {
            if (currentState !== STATE_PLAYING) return;
            
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            // Speed up
            speed += diffSettings[difficulty].speedRate;
            score += speed / 10;
            document.getElementById('score-val').textContent = Math.floor(score);

            // Level complete check
            if (gameMode === 'level' && score >= targetScore) {
                levelComplete();
                return;
            }

            // Player smooth movement
            player.x += (player.targetX - player.x) * 0.2;

            // Spawning
            spawnTimer++;
            const spawnRate = diffSettings[difficulty].spawnRate;
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                const typeRand = Math.random();
                if (typeRand < 0.8) {
                    const types = ['square', 'rectangle', 'circle', 'moving', 'fast'];
                    const t = types[Math.floor(Math.random() * types.length)];
                    obstacles.push(new Obstacle(t));
                } else if (typeRand < 0.95) {
                    pickups.push(new Pickup('coin'));
                } else {
                    pickups.push(new Pickup('shield'));
                }
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update(dt);
                
                // Collision
                const obs = obstacles[i];
                if (Math.abs(player.x - obs.x) < (player.width + obs.width) / 2 - 10 &&
                    Math.abs(player.y - obs.y) < (player.height + obs.height) / 2 - 10) {
                    
                    if (player.shield) {
                        player.shield = false;
                        document.getElementById('shield-indicator').classList.add('hidden');
                        obstacles.splice(i, 1);
                        createExplosion(obs.x, obs.y, '#fff', 10);
                        sfx.hit();
                    } else {
                        gameOver();
                        return;
                    }
                }

                if (obstacles[i] && obstacles[i].y > gameHeight + 100) {
                    obstacles.splice(i, 1);
                }
            }

            // Update pickups
            for (let i = pickups.length - 1; i >= 0; i--) {
                pickups[i].update();
                
                const p = pickups[i];
                if (Math.abs(player.x - p.x) < player.width && Math.abs(player.y - p.y) < player.height) {
                    if (p.type === 'coin') {
                        gameCoins++;
                        document.getElementById('coin-val').textContent = gameCoins;
                        sfx.coin();
                        createExplosion(p.x, p.y, varToColor('--neon-yellow'), 5);
                    } else if (p.type === 'shield') {
                        player.shield = true;
                        document.getElementById('shield-indicator').classList.remove('hidden');
                        sfx.win();
                        createExplosion(p.x, p.y, varToColor('--neon-lime'), 8);
                    }
                    pickups.splice(i, 1);
                }

                if (pickups[i] && pickups[i].y > gameHeight + 100) {
                    pickups.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, gameWidth, gameHeight);

            // Draw Lanes
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, gameHeight);
                ctx.stroke();
            }

            // Lane markers (rolling effect)
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.1)';
            ctx.setLineDash([20, 40]);
            ctx.lineDashOffset = -score * 2;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, gameHeight);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Draw pickups and obstacles
            pickups.forEach(p => p.draw());
            obstacles.forEach(o => o.draw());
            particles.forEach(p => p.draw());

            // Draw Player
            ctx.save();
            ctx.shadowBlur = player.shield ? 20 : 10;
            ctx.shadowColor = player.shield ? varToColor('--neon-lime') : player.color;
            ctx.strokeStyle = player.shield ? varToColor('--neon-lime') : player.color;
            ctx.lineWidth = player.shield ? 4 : 3;
            
            const px = player.x - player.width / 2;
            const py = player.y - player.height / 2;
            
            // Neon player body
            ctx.strokeRect(px, py, player.width, player.height);
            // Inner glow effect
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 4, py + 4, player.width - 8, player.height - 8);
            
            // Exhaust flame/trail
            if (currentState === STATE_PLAYING) {
                ctx.fillStyle = player.color;
                const trailH = 20 + Math.random() * 10;
                ctx.globalAlpha = 0.5;
                ctx.fillRect(player.x - 5, player.y + player.height / 2, 10, trailH);
            }
            ctx.restore();

            // Background simple scanline
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < gameHeight; i += 4) {
                ctx.fillRect(0, i, gameWidth, 1);
            }
        }

        function gameOver() {
            currentState = STATE_GAMEOVER;
            sfx.hit();
            createExplosion(player.x, player.y, player.color, 30);
            
            coins += gameCoins;
            localStorage.setItem('neon_runner_coins', coins);

            setTimeout(() => {
                document.getElementById('final-score').textContent = Math.floor(score);
                document.getElementById('gained-coins').textContent = gameCoins;
                showOverlay('gameover-overlay');
            }, 500);
        }

        function levelComplete() {
            currentState = STATE_COMPLETE;
            sfx.win();
            
            coins += gameCoins;
            localStorage.setItem('neon_runner_coins', coins);
            
            if (currentLevel === unlockedLevels && unlockedLevels < 50) {
                unlockedLevels++;
                localStorage.setItem('neon_runner_levels', unlockedLevels);
            }

            setTimeout(() => {
                showOverlay('complete-overlay');
            }, 500);
        }

        // UI Handlers
        document.getElementById('start-endless').onclick = () => {
            sfx.click();
            initGame('endless');
        };

        document.getElementById('start-levels').onclick = () => {
            sfx.click();
            renderLevelGrid();
            showOverlay('level-overlay');
        };

        function renderLevelGrid() {
            const grid = document.getElementById('level-items');
            grid.innerHTML = '';
            for (let i = 1; i <= 50; i++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.textContent = i;
                if (i > unlockedLevels) {
                    card.classList.add('locked');
                } else if (i < unlockedLevels) {
                    card.classList.add('completed');
                    card.onclick = () => { sfx.click(); initGame('level', i); };
                } else {
                    card.onclick = () => { sfx.click(); initGame('level', i); };
                }
                grid.appendChild(card);
            }
        }

        document.getElementById('open-shop').onclick = () => {
            sfx.click();
            renderShop();
            showOverlay('shop-overlay');
        };

        function renderShop() {
            document.getElementById('shop-coin-val').textContent = coins;
            const grid = document.getElementById('shop-items');
            grid.innerHTML = '';
            
            for (const key in themes) {
                const item = themes[key];
                const card = document.createElement('div');
                card.className = 'shop-item';
                if (selectedTheme === key) card.classList.add('selected');
                
                const isUnlocked = unlockedThemes.includes(key);
                if (!isUnlocked) card.classList.add('locked');

                card.innerHTML = `
                    <div class="theme-preview" style="background: ${item.color}; box-shadow: 0 0 10px ${item.color}"></div>
                    <div style="font-size: 0.8rem; margin-bottom: 5px;">${item.name}</div>
                    <div class="price-tag">${isUnlocked ? 'UNLOCKED' : item.price + ' 🪙'}</div>
                `;

                card.onclick = () => {
                    sfx.click();
                    if (isUnlocked) {
                        selectedTheme = key;
                        player.color = item.color;
                        localStorage.setItem('neon_runner_theme', key);
                        renderShop();
                    } else if (coins >= item.price) {
                        coins -= item.price;
                        unlockedThemes.push(key);
                        localStorage.setItem('neon_runner_coins', coins);
                        localStorage.setItem('neon_runner_unlocked_themes', JSON.stringify(unlockedThemes));
                        selectedTheme = key;
                        player.color = item.color;
                        localStorage.setItem('neon_runner_theme', key);
                        renderShop();
                    }
                };
                grid.appendChild(card);
            }
        }

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.onclick = () => {
                sfx.click();
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
            };
        });

        document.getElementById('back-to-menu-from-levels').onclick = () => { sfx.click(); showOverlay('menu-overlay'); };
        document.getElementById('back-to-menu-from-shop').onclick = () => { sfx.click(); showOverlay('menu-overlay'); };
        document.getElementById('exit-btn').onclick = () => { sfx.click(); showOverlay('menu-overlay'); };
        document.getElementById('exit-complete-btn').onclick = () => { sfx.click(); showOverlay('menu-overlay'); };
        
        document.getElementById('restart-btn').onclick = () => {
            sfx.click();
            initGame(gameMode, currentLevel);
        };

        document.getElementById('next-level-btn').onclick = () => {
            sfx.click();
            if (currentLevel < 50) initGame('level', currentLevel + 1);
            else showOverlay('menu-overlay');
        };

        document.getElementById('resume-btn').onclick = () => {
            sfx.click();
            currentState = STATE_PLAYING;
            showOverlay('');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        };

        document.getElementById('quit-btn').onclick = () => { sfx.click(); showOverlay('menu-overlay'); };

        // Controls
        window.addEventListener('keydown', (e) => {
            if (currentState !== STATE_PLAYING) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
            if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
                currentState = STATE_PAUSED;
                showOverlay('pause-overlay');
            }
        });

        document.getElementById('btn-left').onclick = (e) => { e.preventDefault(); moveLeft(); };
        document.getElementById('btn-right').onclick = (e) => { e.preventDefault(); moveRight(); };
        document.getElementById('btn-pause').onclick = (e) => { 
            e.preventDefault(); 
            currentState = STATE_PAUSED; 
            showOverlay('pause-overlay'); 
        };

        // Swipe Controls
        let touchStartX = 0;
        let touchStartY = 0;
        container.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        container.addEventListener('touchend', (e) => {
            if (currentState !== STATE_PLAYING) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
                if (dx > 0) moveRight();
                else moveLeft();
            }
        }, {passive: true});

        // Initialize
        window.addEventListener('resize', resize);
        resize();
        showOverlay('menu-overlay');

    </script>
</body>
</html>
